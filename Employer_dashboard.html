<h2>Employer Dashboard</h2>

{% if jobs %}
<table border="1" cellpadding="10" style="border-collapse: collapse; width: 80%;">
    <tr>
        <th>Job Title</th>
        <th>Location</th>
        <th>Applicants</th>
        <th>Action</th>
    </tr>

    {% for job in jobs %}
    <tr>
        <td>{{ job.title }}</td>
        <td>{{ job.location }}</td>
        <td>{{ job.applicant_count }}</td>
        <td>
            <a href="{% url 'view_applicants' job.id %}">View Applicants</a>
        </td>
    </tr>
    {% endfor %}

</table>
{% else %}
<p>No jobs posted yet.</p>
{% endif %}
